name: Build & Test

on:
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "*.md"
      - ".github/workflows/release.yml"
      - ".github/workflows/commitlint.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/Puhu.Plugin.MyPlugin/Puhu.Plugin.MyPlugin.csproj

      - name: Build
        run: dotnet build --configuration Release --no-restore src/Puhu.Plugin.MyPlugin/Puhu.Plugin.MyPlugin.csproj
